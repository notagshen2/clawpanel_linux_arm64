# ClawPanel 发布构建工作流
# 推送 v* 标签时自动构建 Linux ARM64 的 deb 并创建 GitHub Release
name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: '发布版本号 (例如: v1.0.0)'
        required: true
        type: string
        default: 'v1.0.0'

jobs:
  build:
    name: 构建 (Linux ARM64 / deb)
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: write

    steps:
      - name: 签出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 设置版本标签
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "TAG_NAME=${{ github.event.inputs.tag_name }}" >> "$GITHUB_ENV"
          else
            echo "TAG_NAME=${{ github.ref_name }}" >> "$GITHUB_ENV"
          fi

      - name: 确保标签存在（手动触发时）
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        run: |
          git fetch --tags
          if git rev-parse "$TAG_NAME" >/dev/null 2>&1; then
            echo "标签 $TAG_NAME 已存在"
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag "$TAG_NAME"
            git push origin "$TAG_NAME"
          fi

      - name: 确保 Release 存在
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            echo "Release $TAG_NAME 已存在"
          else
            gh release create "$TAG_NAME" \
              --title "ClawPanel $TAG_NAME" \
              --notes "正在构建 Linux ARM64 的 deb 安装包，请稍候..."
          fi

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: 安装前端依赖
        run: npm ci

      - name: 安装 Rust 工具链
        uses: dtolnay/rust-toolchain@stable

      - name: Rust 编译缓存
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          key: linux-arm64-deb

      - name: 安装 Linux 系统依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev

      - name: 构建 Tauri 应用
        run: npm run tauri build -- --bundles deb

      - name: 上传 deb 到 Release
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DEB_FILE=$(find src-tauri/target/release/bundle/deb -maxdepth 1 -type f -name '*.deb' | head -n 1)
          if [ -z "$DEB_FILE" ]; then
            echo "未找到 deb 安装包"
            exit 1
          fi
          gh release upload "$TAG_NAME" "$DEB_FILE" --clobber

  update-release-notes:
    name: 更新 Release Notes
    needs: build
    runs-on: ubuntu-latest
    if: always() && needs.build.result != 'cancelled'
    permissions:
      contents: write

    steps:
      - name: 签出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 设置版本标签
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "TAG_NAME=${{ github.event.inputs.tag_name }}" >> "$GITHUB_ENV"
          else
            echo "TAG_NAME=${{ github.ref_name }}" >> "$GITHUB_ENV"
          fi

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: 构建前端并上传热更新包
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${TAG_NAME#v}"

          npm ci
          npm run build

          cd dist
          zip -r "../web-${VERSION}.zip" .
          cd ..

          HASH=$(sha256sum "web-${VERSION}.zip" | cut -d' ' -f1)
          SIZE=$(stat -c%s "web-${VERSION}.zip" 2>/dev/null || stat -f%z "web-${VERSION}.zip")

          gh release upload "$TAG_NAME" "web-${VERSION}.zip" --clobber

          DL_URL="https://github.com/${{ github.repository }}/releases/download/${TAG_NAME}/web-${VERSION}.zip"
          cat > docs/update/latest.json << EOF
          {
            "version": "${VERSION}",
            "minAppVersion": "${VERSION}",
            "hash": "sha256:${HASH}",
            "url": "${DL_URL}",
            "size": ${SIZE},
            "changelog": "",
            "releasedAt": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          }
          EOF
          sed -i 's/^          //' docs/update/latest.json

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/update/latest.json
          git commit -m "ci: update latest.json for ${TAG_NAME}" || true
          git push origin HEAD:main || true

      - name: 生成并更新 Release Notes
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BUILD_RESULT: ${{ needs.build.result }}
          REPO: ${{ github.repository }}
        run: |
          VERSION="${TAG_NAME#v}"
          DL="https://github.com/${REPO}/releases/download/${TAG_NAME}"

          PREV_TAG=$(git tag --sort=-v:refname | grep -E '^v' | sed -n '2p' || echo "")
          if [ -n "$PREV_TAG" ]; then
            RANGE="${PREV_TAG}..HEAD"
            CHANGELOG_HEADER="自 ${PREV_TAG} 以来的变更"
          else
            RANGE=""
            CHANGELOG_HEADER="主要变更"
          fi

          get_logs() {
            local prefix="$1"
            if [ -n "$RANGE" ]; then
              git log "$RANGE" --pretty=format:"%s" --no-merges | { grep -iE "^${prefix}" || true; } | sed "s/^${prefix}[:(] */- /" | head -20
            else
              git log --pretty=format:"%s" --no-merges -30 | { grep -iE "^${prefix}" || true; } | sed "s/^${prefix}[:(] */- /" | head -20
            fi
          }

          FEATS=$(get_logs "feat")
          FIXES=$(get_logs "fix")
          OTHERS=$(
            if [ -n "$RANGE" ]; then
              git log "$RANGE" --pretty=format:"%s" --no-merges | { grep -ivE "^(feat|fix|style|chore|ci|docs|test|build)" || true; } | sed 's/^/- /' | head -10
            else
              git log --pretty=format:"%s" --no-merges -30 | { grep -ivE "^(feat|fix|style|chore|ci|docs|test|build)" || true; } | sed 's/^/- /' | head -10
            fi
          )

          CHANGELOG_BODY=""
          if [ -n "$FEATS" ]; then
            CHANGELOG_BODY="${CHANGELOG_BODY}"$'\n### ✨ 新功能\n'"${FEATS}"$'\n'
          fi
          if [ -n "$FIXES" ]; then
            CHANGELOG_BODY="${CHANGELOG_BODY}"$'\n### 🐛 修复\n'"${FIXES}"$'\n'
          fi
          if [ -n "$OTHERS" ]; then
            CHANGELOG_BODY="${CHANGELOG_BODY}"$'\n### 📦 其他\n'"${OTHERS}"$'\n'
          fi
          if [ -z "$CHANGELOG_BODY" ]; then
            CHANGELOG_BODY=$'\n- 常规更新与优化\n'
          fi

          if [ "$BUILD_RESULT" = "success" ]; then
            STATUS_BADGE="✅ Linux ARM64 deb 构建成功"
          else
            STATUS_BADGE="⚠️ Linux ARM64 deb 构建失败，请查看 [Actions 日志](https://github.com/${REPO}/actions)"
          fi

          {
            echo "${STATUS_BADGE}"
            echo ""
            echo "## 📥 下载安装"
            echo ""
            echo "### Linux ARM64"
            echo "| 格式 | 安装包 |"
            echo "|------|--------|"
            echo "| DEB（Debian/Ubuntu） | [ClawPanel_${VERSION}_arm64.deb](${DL}/ClawPanel_${VERSION}_arm64.deb) |"
            echo ""
            echo "---"
            echo ""
            echo "## 🚀 首次使用"
            echo ""
            echo "1. 安装并打开 ClawPanel"
            echo "2. 首次运行会自动检测 Node.js 环境和 OpenClaw CLI"
            echo "3. 如未安装 OpenClaw，按提示一键安装即可"
            echo "4. 安装完成后自动跳转仪表盘，开始使用"
            echo ""
            echo "> **系统要求**：Linux ARM64，Node.js 18+（推荐 22 LTS）"
            echo ""
            echo "---"
            echo ""
            echo "## ${CHANGELOG_HEADER}"
            echo "${CHANGELOG_BODY}"
            echo "---"
            echo ""
            echo "📖 [项目主页](https://github.com/${REPO}) · 💬 [反馈问题](https://github.com/${REPO}/issues) · 📣 [QQ 群](https://qt.cool/c/OpenClaw)"
          } > release_body.md

          gh release edit "$TAG_NAME" --notes-file release_body.md
